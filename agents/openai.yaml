interface:
  display_name: "Explore"
  short_description: "Require explorer subagents for codebase reconnaissance"
  default_prompt: "When a task meets Explore conditions, or when the user invokes $explore, delegate explorer subagents to map the codebase before making changes. Subagent reconnaissance is mandatory; wait for every spawned explorer to reach a terminal result before reading target code, synthesizing findings, or editing files. Partial explorer results are not enough to proceed. If subagents cannot be spawned, stop and report that Explore is blocked."
